<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Editor — Headshot Workshop</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #f0ede8; color: #1a1a1a; min-height: 100vh; font-size: 14px; }

/* LOGIN */
#loginScreen {
  position: fixed; inset: 0; background: #f0ede8;
  display: flex; align-items: center; justify-content: center; z-index: 999;
}
.login-box { background: #fff; border: 1px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 2.5rem; width: 340px; text-align: center; }
.login-box h1 { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.25rem; }
.login-box p { font-size: 0.8rem; color: #888; margin-bottom: 1.5rem; }
.login-box input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; margin-bottom: 10px; outline: none; font-family: inherit; }
.login-box input:focus { border-color: #1C1CB8; }
.login-btn { width: 100%; padding: 10px; background: #1C1CB8; color: #fff; border: none; border-radius: 6px; font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: inherit; }
.login-btn:hover { background: #1414a0; }
.login-error { color: #8B1A1A; font-size: 0.78rem; margin-top: 8px; display: none; }

/* LAYOUT */
#adminApp { display: none; height: 100vh; overflow: hidden; }
.admin-layout { display: grid; grid-template-columns: 340px 1fr; height: 100vh; }

/* SIDEBAR */
.sidebar { background: #fff; border-right: 1px solid #e5e2dc; display: flex; flex-direction: column; overflow: hidden; }
.sidebar-header { padding: 1rem 1.25rem; border-bottom: 1px solid #e5e2dc; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.sidebar-header h2 { font-size: 0.95rem; font-weight: 600; }
.sidebar-header span { font-size: 0.7rem; color: #888; }
.sidebar-tabs { display: flex; border-bottom: 1px solid #e5e2dc; flex-shrink: 0; }
.tab-btn { flex: 1; padding: 0.6rem; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; border: none; background: none; cursor: pointer; color: #888; border-bottom: 2px solid transparent; transition: all 0.12s; font-family: inherit; }
.tab-btn.active { color: #1C1CB8; border-bottom-color: #1C1CB8; }
.sidebar-body { flex: 1; overflow-y: auto; padding: 1rem 1.25rem; }

/* FIELD GROUPS */
.field-group { margin-bottom: 1.25rem; }
.field-group label { display: block; font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #888; margin-bottom: 5px; }
.field-group input[type=text],
.field-group input[type=email],
.field-group input[type=number],
.field-group input[type=password],
.field-group select,
.field-group textarea { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.875rem; outline: none; font-family: inherit; transition: border-color 0.12s; background: #faf9f7; }
.field-group input:focus, .field-group select:focus, .field-group textarea:focus { border-color: #1C1CB8; background: #fff; }
.field-group textarea { min-height: 72px; resize: vertical; line-height: 1.5; }
.color-row { display: flex; align-items: center; gap: 8px; }
.color-row input[type=color] { width: 36px; height: 32px; padding: 2px; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; flex-shrink: 0; background: #faf9f7; }
.color-row input[type=text] { flex: 1; }

/* SECTION REORDER */
.section-list { display: flex; flex-direction: column; gap: 6px; }
.section-item { background: #faf9f7; border: 1px solid #e5e2dc; border-radius: 8px; padding: 0.75rem 1rem; cursor: grab; display: flex; align-items: center; gap: 10px; transition: box-shadow 0.12s; user-select: none; }
.section-item:active { cursor: grabbing; box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
.section-item.dragging { opacity: 0.5; }
.section-item.drag-over { border-color: #1C1CB8; background: rgba(28,28,184,0.04); }
.drag-handle { color: #ccc; font-size: 1.1rem; flex-shrink: 0; }
.section-item-label { font-size: 0.875rem; font-weight: 500; }
.section-item-hint { font-size: 0.7rem; color: #aaa; margin-left: auto; }

/* DIVIDERS */
.field-divider { border: none; border-top: 1px solid #e5e2dc; margin: 1rem 0; }
.field-section-title { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #bbb; margin-bottom: 0.75rem; margin-top: 0.25rem; }

/* GITHUB SETTINGS */
.gh-status { font-size: 0.75rem; padding: 6px 10px; border-radius: 5px; background: #f0f0f0; color: #666; margin-bottom: 10px; }
.gh-status.ok { background: #e6f4ea; color: #2d6a4f; }
.gh-status.err { background: #fce8e8; color: #8B1A1A; }

/* PUBLISH BAR */
.publish-bar { padding: 1rem 1.25rem; border-top: 1px solid #e5e2dc; flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
.publish-btn { width: 100%; padding: 10px; background: #8B1A1A; color: #fff; border: none; border-radius: 7px; font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.12s; }
.publish-btn:hover { background: #711515; }
.publish-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.preview-btn { width: 100%; padding: 9px; background: #fff; color: #1a1a1a; border: 1px solid #ddd; border-radius: 7px; font-size: 0.85rem; font-weight: 500; cursor: pointer; font-family: inherit; }
.preview-btn:hover { background: #faf9f7; }
.publish-status { font-size: 0.75rem; color: #888; text-align: center; min-height: 1rem; }
.publish-status.ok { color: #2d6a4f; }
.publish-status.err { color: #8B1A1A; }

/* PREVIEW PANE */
.preview-pane { background: #e8e4de; display: flex; flex-direction: column; overflow: hidden; }
.preview-topbar { padding: 0.6rem 1rem; background: #fff; border-bottom: 1px solid #e5e2dc; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.preview-topbar span { font-size: 0.72rem; color: #888; }
.preview-url { font-size: 0.72rem; color: #1C1CB8; text-decoration: none; flex: 1; text-align: right; }
.preview-frame-wrap { flex: 1; overflow: hidden; padding: 1rem; }
.preview-frame-wrap iframe { width: 100%; height: 100%; border: none; border-radius: 8px; background: #fff; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }

/* INSTRUCTIONS */
.instructions { background: #fff7ed; border: 1px solid #f0d9b5; border-radius: 8px; padding: 1rem; font-size: 0.78rem; line-height: 1.6; color: #5a3e1b; }
.instructions strong { font-weight: 600; }
.instructions ol { padding-left: 1.25rem; margin-top: 0.5rem; }
.instructions li { margin-bottom: 4px; }
.instructions code { background: rgba(0,0,0,0.07); padding: 1px 5px; border-radius: 3px; font-family: monospace; font-size: 0.85em; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h1>Site Editor</h1>
    <p>Headshot Workshop Admin</p>
    <input type="password" id="loginPw" placeholder="Password" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="login-btn" onclick="tryLogin()">Sign In</button>
    <p class="login-error" id="loginError">Incorrect password.</p>
  </div>
</div>

<!-- ADMIN APP -->
<div id="adminApp">
  <div class="admin-layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>Site Editor</h2>
        <span>Headshot Workshop</span>
      </div>
      <div class="sidebar-tabs">
        <button class="tab-btn active" onclick="showTab('content')" id="tab-content">Content</button>
        <button class="tab-btn" onclick="showTab('design')" id="tab-design">Design</button>
        <button class="tab-btn" onclick="showTab('sections')" id="tab-sections">Sections</button>
        <button class="tab-btn" onclick="showTab('publish')" id="tab-publish">Publish</button>
      </div>
      <div class="sidebar-body" id="sidebarBody"></div>
      <div class="publish-bar">
        <button class="publish-btn" onclick="publishSite()" id="publishBtn">Publish to GitHub Pages</button>
        <button class="preview-btn" onclick="refreshPreview()">Refresh Preview</button>
        <p class="publish-status" id="publishStatus"></p>
      </div>
    </div>

    <!-- PREVIEW -->
    <div class="preview-pane">
      <div class="preview-topbar">
        <span>Live Preview</span>
        <a class="preview-url" id="previewUrl" href="#" target="_blank">—</a>
      </div>
      <div class="preview-frame-wrap">
        <iframe id="previewFrame" src="index.html"></iframe>
      </div>
    </div>

  </div>
</div>

<script>
// ─── AUTH ───────────────────────────────────────────────
const PASS_HASH = '7c1e6843e8d04dd8e83c3f7b2bb9c3a8d1e6f9c2a5b8d1e4f7a2c5b8e1d4f7a0'; // amyandniki
async function hash(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function tryLogin() {
  const pw = document.getElementById('loginPw').value;
  const h = await hash(pw);
  if (pw === 'amyandniki') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminApp').style.display = 'block';
    init();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

// ─── STATE ──────────────────────────────────────────────
let CFG = null;
let activeTab = 'content';
let dragSrc = null;

const FONT_OPTIONS = [
  'Bebas Neue', 'Anton', 'Black Han Sans', 'Oswald', 'Russo One',
  'DM Sans', 'Inter', 'Lato', 'Poppins', 'Nunito', 'Raleway',
  'Playfair Display', 'Merriweather', 'Libre Baskerville'
];

const COLOR_LABELS = {
  accent1: 'Accent 1 (Blue)',
  accent2: 'Accent 2 (Red)',
  background: 'Background',
  backgroundDark: 'Background Dark',
  backgroundMid: 'Background Mid',
  text: 'Text',
  muted: 'Muted Text'
};

const SECTION_FIELD_LABELS = {
  hero: { eyebrow:'Eyebrow text', title1:'Title line 1', title2:'Title line 2', subtitle:'Subtitle', date:'Date', time:'Time', location:'Location', price:'Price', includesLine:'Includes line' },
  includes: { items:'Items (separated by ·)' },
  slots: { title:'Section title', description:'Description', startHour:'Start hour (24h)', startMin:'Start minute', totalSlots:'Total slots', lunchAfterMin:'Lunch starts after (mins from midnight)', lunchDurationMin:'Lunch duration (mins)', takenSlots:'Pre-taken slot indexes (comma separated)' },
  form: { title:'Section title', description:'Description', venmoHandle:'Venmo handle', price:'Price (numbers only)', notificationEmail:'Notification email', formspreeEndpoint:'Formspree endpoint' },
  footer: { text:'Footer text' }
};

async function init() {
  try {
    const r = await fetch('site-config.json?v=' + Date.now());
    CFG = await r.json();
  } catch(e) {
    alert('Could not load site-config.json. Make sure it exists in the same folder as this file.');
    return;
  }
  renderTab();
  updatePreviewUrl();
}

function sec(id) { return CFG.sections.find(s => s.id === id); }

// ─── TABS ────────────────────────────────────────────────
function showTab(t) {
  activeTab = t;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  renderTab();
}

function renderTab() {
  const body = document.getElementById('sidebarBody');
  if (activeTab === 'content') renderContent(body);
  else if (activeTab === 'design') renderDesign(body);
  else if (activeTab === 'sections') renderSections(body);
  else if (activeTab === 'publish') renderPublish(body);
}

// ─── CONTENT TAB ────────────────────────────────────────
function renderContent(el) {
  let html = '';
  CFG.sections.forEach(section => {
    const labels = SECTION_FIELD_LABELS[section.id] || {};
    html += `<p class="field-section-title">${section.label}</p>`;
    Object.entries(section.fields).forEach(([key, val]) => {
      const label = labels[key] || key;
      const isMultiline = typeof val === 'string' && (val.length > 60 || key === 'description' || key === 'subtitle' || key === 'items' || key === 'includesLine' || key === 'text');
      const isNumber = typeof val === 'number';
      const isArray = Array.isArray(val);
      const inputVal = isArray ? val.join(', ') : val;

      if (isMultiline) {
        html += `<div class="field-group"><label>${label}</label><textarea data-section="${section.id}" data-key="${key}" oninput="updateField(this)">${escHtml(inputVal)}</textarea></div>`;
      } else if (isNumber) {
        html += `<div class="field-group"><label>${label}</label><input type="number" data-section="${section.id}" data-key="${key}" value="${inputVal}" oninput="updateField(this)"></div>`;
      } else {
        html += `<div class="field-group"><label>${label}</label><input type="text" data-section="${section.id}" data-key="${key}" value="${escHtml(inputVal)}" oninput="updateField(this)"></div>`;
      }
    });
    html += `<hr class="field-divider">`;
  });
  el.innerHTML = html;
}

function updateField(input) {
  const sId = input.dataset.section;
  const key = input.dataset.key;
  const s = sec(sId);
  if (!s) return;
  const original = s.fields[key];
  if (Array.isArray(original)) {
    s.fields[key] = input.value.split(',').map(v => v.trim()).map(Number).filter(n => !isNaN(n));
  } else if (typeof original === 'number') {
    s.fields[key] = parseFloat(input.value) || 0;
  } else {
    s.fields[key] = input.value;
  }
  saveLocalAndRefresh();
}

// ─── DESIGN TAB ─────────────────────────────────────────
function renderDesign(el) {
  let html = '<p class="field-section-title">Colors</p>';
  Object.entries(CFG.colors).forEach(([key, val]) => {
    html += `<div class="field-group"><label>${COLOR_LABELS[key] || key}</label>
      <div class="color-row">
        <input type="color" value="${val}" oninput="updateColor('${key}', this.value)">
        <input type="text" value="${val}" maxlength="7" oninput="updateColorText('${key}', this)" placeholder="#000000">
      </div></div>`;
  });

  html += `<hr class="field-divider"><p class="field-section-title">Fonts</p>`;
  ['display','body'].forEach(role => {
    html += `<div class="field-group"><label>${role === 'display' ? 'Display / Heading font' : 'Body font'}</label>
      <select data-role="${role}" onchange="updateFont(this)">
        ${FONT_OPTIONS.map(f => `<option value="${f}" ${CFG.fonts[role]===f?'selected':''}>${f}</option>`).join('')}
      </select></div>`;
  });

  el.innerHTML = html;
}

function updateColor(key, val) {
  CFG.colors[key] = val;
  // sync text input
  const inputs = document.querySelectorAll(`[oninput*="updateColor('${key}'"]`);
  inputs.forEach(i => { if (i.type === 'text') i.value = val; });
  saveLocalAndRefresh();
}
function updateColorText(key, input) {
  const val = input.value;
  if (/^#[0-9a-fA-F]{6}$/.test(val)) {
    CFG.colors[key] = val;
    const colorInput = input.previousElementSibling;
    if (colorInput) colorInput.value = val;
    saveLocalAndRefresh();
  }
}
function updateFont(select) {
  CFG.fonts[select.dataset.role] = select.value;
  saveLocalAndRefresh();
}

// ─── SECTIONS TAB ───────────────────────────────────────
function renderSections(el) {
  let html = `<p style="font-size:0.78rem;color:#888;margin-bottom:0.75rem;line-height:1.5;">Drag to reorder sections on the page.</p>`;
  html += `<div class="section-list" id="sectionList">`;
  CFG.sections.forEach((s, i) => {
    html += `<div class="section-item" draggable="true" data-index="${i}"
      ondragstart="dragStart(event,${i})" ondragover="dragOver(event,${i})"
      ondragleave="dragLeave(event)" ondrop="drop(event,${i})">
      <span class="drag-handle">⠿</span>
      <span class="section-item-label">${s.label}</span>
      <span class="section-item-hint">drag to reorder</span>
    </div>`;
  });
  html += `</div>`;
  el.innerHTML = html;
}

function dragStart(e, i) { dragSrc = i; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
function dragOver(e, i) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; if (i !== dragSrc) e.currentTarget.classList.add('drag-over'); }
function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function drop(e, i) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (dragSrc === null || dragSrc === i) return;
  const arr = CFG.sections;
  const item = arr.splice(dragSrc, 1)[0];
  arr.splice(i, 0, item);
  dragSrc = null;
  saveLocalAndRefresh();
  renderSections(document.getElementById('sidebarBody'));
}

// ─── PUBLISH TAB ────────────────────────────────────────
function renderPublish(el) {
  const gh = JSON.parse(localStorage.getItem('gh_settings') || '{}');
  el.innerHTML = `
    <div class="instructions">
      <strong>One-time setup (takes 2 min):</strong>
      <ol>
        <li>Create a free account at <strong>github.com</strong></li>
        <li>Create a new repository (e.g. <code>headshot-workshop</code>)</li>
        <li>Go to Settings → Pages → Source: <strong>main branch</strong></li>
        <li>Go to Settings → Developer Settings → Personal Access Tokens → Tokens (classic) → Generate new token. Check <strong>repo</strong> scope. Copy the token.</li>
        <li>Upload <code>site-config.json</code> and <code>index.html</code> to the repo's main branch first.</li>
        <li>Fill in the fields below and click Publish.</li>
      </ol>
    </div>
    <hr class="field-divider">
    <p class="field-section-title">GitHub Settings</p>
    <div class="field-group"><label>GitHub Username</label><input type="text" id="gh_user" value="${gh.user||''}" placeholder="amypower" oninput="saveGhSettings()"></div>
    <div class="field-group"><label>Repository Name</label><input type="text" id="gh_repo" value="${gh.repo||''}" placeholder="headshot-workshop" oninput="saveGhSettings()"></div>
    <div class="field-group"><label>Personal Access Token</label><input type="password" id="gh_token" value="${gh.token||''}" placeholder="ghp_xxxxxxxxxxxx" oninput="saveGhSettings()"></div>
    <div class="field-group"><label>Branch</label><input type="text" id="gh_branch" value="${gh.branch||'main'}" oninput="saveGhSettings()"></div>
    <p id="gh_status" class="gh-status" style="display:none"></p>
    <button class="login-btn" style="margin-top:8px" onclick="testGhConnection()">Test Connection</button>
    <hr class="field-divider">
    <p style="font-size:0.75rem;color:#888;line-height:1.5;">Your token is saved only in your browser's local storage and never sent anywhere except directly to GitHub's API.</p>
  `;
  updatePreviewUrl();
}

function saveGhSettings() {
  localStorage.setItem('gh_settings', JSON.stringify({
    user: document.getElementById('gh_user')?.value || '',
    repo: document.getElementById('gh_repo')?.value || '',
    token: document.getElementById('gh_token')?.value || '',
    branch: document.getElementById('gh_branch')?.value || 'main',
  }));
  updatePreviewUrl();
}

function updatePreviewUrl() {
  const gh = JSON.parse(localStorage.getItem('gh_settings') || '{}');
  const url = gh.user && gh.repo ? `https://${gh.user}.github.io/${gh.repo}/` : '(set GitHub username + repo in Publish tab)';
  document.getElementById('previewUrl').textContent = url;
  document.getElementById('previewUrl').href = gh.user && gh.repo ? url : '#';
}

async function testGhConnection() {
  const gh = JSON.parse(localStorage.getItem('gh_settings') || '{}');
  const statusEl = document.getElementById('gh_status');
  statusEl.style.display = 'block';
  statusEl.className = 'gh-status';
  statusEl.textContent = 'Testing…';
  try {
    const r = await fetch(`https://api.github.com/repos/${gh.user}/${gh.repo}`, {
      headers: { Authorization: `token ${gh.token}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (r.ok) { statusEl.className = 'gh-status ok'; statusEl.textContent = '✓ Connected successfully'; }
    else { statusEl.className = 'gh-status err'; statusEl.textContent = `✗ Error ${r.status}: ${r.statusText}`; }
  } catch(e) { statusEl.className = 'gh-status err'; statusEl.textContent = '✗ Network error: ' + e.message; }
}

// ─── PUBLISH ────────────────────────────────────────────
async function publishSite() {
  const gh = JSON.parse(localStorage.getItem('gh_settings') || '{}');
  if (!gh.user || !gh.repo || !gh.token) {
    alert('Please fill in your GitHub settings in the Publish tab first.');
    showTab('publish');
    return;
  }

  const btn = document.getElementById('publishBtn');
  const status = document.getElementById('publishStatus');
  btn.disabled = true;
  status.className = 'publish-status';
  status.textContent = 'Publishing…';

  try {
    // Publish site-config.json
    await pushFile(gh, 'site-config.json', JSON.stringify(CFG, null, 2));
    status.textContent = 'Config saved… publishing index.html…';

    // Publish index.html — fetch the current one and push it unchanged (config drives rendering)
    let indexContent;
    try {
      const r = await fetch('index.html?v=' + Date.now());
      indexContent = await r.text();
    } catch(e) { indexContent = null; }
    if (indexContent) await pushFile(gh, 'index.html', indexContent);

    // Publish admin.html
    let adminContent;
    try {
      const r2 = await fetch('admin.html?v=' + Date.now());
      adminContent = await r2.text();
    } catch(e) { adminContent = null; }
    if (adminContent) await pushFile(gh, 'admin.html', adminContent);

    status.className = 'publish-status ok';
    status.textContent = `✓ Published! Changes live at ${gh.user}.github.io/${gh.repo}/ in ~1 min.`;
  } catch(e) {
    status.className = 'publish-status err';
    status.textContent = '✗ ' + e.message;
  }
  btn.disabled = false;
}

async function pushFile(gh, path, content) {
  // Get existing SHA if file exists (required for update)
  let sha = null;
  try {
    const r = await fetch(`https://api.github.com/repos/${gh.user}/${gh.repo}/contents/${path}?ref=${gh.branch||'main'}`, {
      headers: { Authorization: `token ${gh.token}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (r.ok) { const d = await r.json(); sha = d.sha; }
  } catch(e) {}

  const body = { message: `Update ${path} via site editor`, content: btoa(unescape(encodeURIComponent(content))), branch: gh.branch || 'main' };
  if (sha) body.sha = sha;

  const r = await fetch(`https://api.github.com/repos/${gh.user}/${gh.repo}/contents/${path}`, {
    method: 'PUT',
    headers: { Authorization: `token ${gh.token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) {
    const err = await r.json();
    throw new Error(`GitHub error on ${path}: ${err.message}`);
  }
}

// ─── LOCAL SAVE + PREVIEW REFRESH ───────────────────────
function saveLocalAndRefresh() {
  localStorage.setItem('cfg_draft', JSON.stringify(CFG));
  // Write updated config to the preview iframe via postMessage
  const frame = document.getElementById('previewFrame');
  if (frame && frame.contentWindow) {
    frame.contentWindow.postMessage({ type: 'cfg_update', cfg: CFG }, '*');
  }
}

function refreshPreview() {
  const frame = document.getElementById('previewFrame');
  frame.src = 'index.html?v=' + Date.now();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>

<script>
// Inject hot-reload listener into preview via iframe messaging
window.addEventListener('message', e => {
  if (e.data?.type === 'cfg_ready') {
    saveLocalAndRefresh();
  }
});
</script>
</body>
</html>
